<footer>
    <script language="javascript" type="text/javascript">
        const vResizer = document.getElementById('v-resizer');
        const hResizer = document.getElementById('h-resizer');
        const outerGrid = document.getElementById('outerGrid');
        const leftGrid = document.getElementById('leftGrid');

        // Vertical Resize (Left vs Right)
        vResizer.addEventListener('mousedown', (e) => {
            const onMouseMove = (e) => {
                const newWidth = (e.clientX / outerGrid.clientWidth) * 100;
                outerGrid.style.gridTemplateColumns = `${newWidth}% 5px 1fr`;
            };
            setupListeners(onMouseMove);
        });

        // Horizontal Resize (Top vs Bottom on the Left)
        hResizer.addEventListener('mousedown', (e) => {
            const onMouseMove = (e) => {
                // Use the direct pixel Y-coordinate instead of a percentage
                const newHeightPx = e.clientY;

                // Ensure the height doesn't go below 0 or exceed the container height
                if (newHeightPx > 0 && newHeightPx < leftGrid.clientHeight) {
                    leftGrid.style.gridTemplateRows = `${newHeightPx}px 5px 1fr`;
                }
            };
            setupListeners(onMouseMove);
        });

        // Helper to handle mouseup cleaning
        function setupListeners(moveFunc) {
            const onMouseUp = () => {
                document.removeEventListener('mousemove', moveFunc);
                document.removeEventListener('mouseup', onMouseUp);
            };
            document.addEventListener('mousemove', moveFunc);
            document.addEventListener('mouseup', onMouseUp);
        }
    </script>
</footer>
